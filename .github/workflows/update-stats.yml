name: Update Stats Cache

on:
  schedule:
    # Runs every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Script and Commit
        run: |
          # Run the python script and save the output (the version number)
          RESULT=$(python update_cache.py)
          
          # If the script successfully changed the file, commit it
          if [ "$RESULT" != "unchanged" ]; then
            # Use the official GitHub Action Bot credentials
            git config --global user.name "github-actions[bot]"
            git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
            
            git add README.md
            
            # The commit message dynamically includes the version number
            git commit -m "chore(profile): bump stats cache to $RESULT for real-time sync"
            
            git push
            echo "Successfully committed new version: $RESULT"
          else
            echo "No changes were needed. README is already up to date."
          fi
